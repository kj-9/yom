<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__YOM_TITLE__</title>
    <style>
      __YOM_STYLE__
    </style>
  </head>
  <body>
    <button
      class="mobile-nav-toggle"
      id="mobileNavToggle"
      type="button"
      aria-expanded="false"
      aria-controls="sidebar"
    >
      Contents
    </button>
    <div class="layout">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div>
            <h1 class="brand">yom</h1>
            <p class="sub" id="rootLabel"></p>
          </div>
          <div class="sidebar-meta">
            <div class="status" id="statusBadge" data-state="ready">
              <span class="dot"></span><span id="statusText">Watching</span>
            </div>
            <details class="settings-panel">
              <summary
                class="settings-toggle"
                id="settingsToggle"
                aria-label="Open display settings"
              >
                <span aria-hidden="true">&#9881;</span>
              </summary>
              <div class="settings-card">
                <button class="theme-toggle" id="themeToggle" type="button">
                  Dark mode
                </button>
                <div class="settings-group">
                  <span class="settings-label">View</span>
                  <div class="view-mode" role="group" aria-label="View mode">
                    <button
                      class="active"
                      id="renderedMode"
                      type="button"
                      aria-pressed="true"
                    >
                      Rendered
                    </button>
                    <button id="rawMode" type="button" aria-pressed="false">
                      Raw
                    </button>
                  </div>
                </div>
                <label class="palette-picker">
                  <span class="settings-label">Palette</span>
                  <select id="paletteSelect" aria-label="Color preset">
                    <option value="paper">Paper</option>
                    <option value="forest">Forest</option>
                    <option value="sea">Sea</option>
                  </select>
                </label>
              </div>
            </details>
          </div>
        </div>
        <label class="search">
          <span class="search-label">Filter</span>
          <input id="treeSearch" type="search" placeholder="Filter items" />
        </label>
        <div class="tree-toolbar">
          <div class="tree-label">Contents</div>
          <div class="tree-actions">
            <button id="collapseTree" type="button">Collapse</button>
            <button id="expandTree" type="button">Expand</button>
          </div>
        </div>
        <div id="treeRoot"></div>
      </aside>
      <div
        class="sidebar-resizer"
        id="sidebarResizer"
        role="separator"
        aria-label="Resize sidebar"
        aria-orientation="vertical"
        aria-valuemin="220"
        aria-valuemax="560"
        aria-valuenow="304"
        tabindex="0"
      ></div>
      <main>
        <div class="reader-shell">
          <article class="content-panel">
            <div id="docRoot" class="empty">
              Select an item from the list on the left.
            </div>
            <pre id="rawRoot" class="raw-view" hidden><code></code></pre>
          </article>
        </div>
      </main>
    </div>
    <script>
      __YOM_SCRIPT__;
    </script>
  </body>
</html>
