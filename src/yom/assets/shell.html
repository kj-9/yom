<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__YOM_TITLE__</title>
    <style>
      __YOM_STYLE__
    </style>
  </head>
  <body>
    <button
      class="mobile-nav-toggle"
      id="mobileNavToggle"
      type="button"
      aria-expanded="false"
      aria-controls="sidebar"
    >
      Contents
    </button>
    <div class="layout">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div>
            <h1 class="brand">yom</h1>
            <p class="sub" id="rootLabel"></p>
          </div>
          <div class="sidebar-tools">
            <button class="theme-toggle" id="themeToggle" type="button">
              Dark mode
            </button>
            <label class="palette-picker">
              <span class="visually-hidden">Color preset</span>
              <select id="paletteSelect" aria-label="Color preset">
                <option value="paper">Paper</option>
                <option value="forest">Forest</option>
                <option value="sea">Sea</option>
              </select>
            </label>
            <div class="status" id="statusBadge" data-state="ready">
              <span class="dot"></span><span id="statusText">Watching</span>
            </div>
          </div>
        </div>
        <div class="sidebar-summary" id="sidebarSummary">
          <div class="summary-card">
            <span class="summary-label">Items</span>
            <strong id="docCount">0</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">Shown</span>
            <strong id="visibleCount">0</strong>
          </div>
        </div>
        <label class="search">
          <span class="search-label">Filter</span>
          <input id="treeSearch" type="search" placeholder="Filter items" />
        </label>
        <div class="tree-label">Contents</div>
        <div id="treeRoot"></div>
      </aside>
      <main>
        <article>
          <div class="doc-header">
            <div>
              <div class="meta" id="docMeta"></div>
              <h1 class="doc-title" id="docTitle">Select a document</h1>
              <div class="doc-jump-list" id="docJumpList" hidden></div>
            </div>
            <div class="doc-actions">
              <a id="docOpen" class="doc-link" href="#" hidden
                >Open current path</a
              >
            </div>
          </div>
          <div id="docRoot" class="empty">
            Select an item from the list on the left.
          </div>
          <section class="outline" id="outlineSection" hidden>
            <div class="outline-label">Sections</div>
            <nav id="outlineRoot"></nav>
          </section>
        </article>
      </main>
    </div>
    <script>
      __YOM_SCRIPT__;
    </script>
  </body>
</html>
