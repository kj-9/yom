name: Publish Bun Package

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checks
        run: bun run check

      - name: Check formatting
        run: bun run format

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Publish package
        run: bun publish
