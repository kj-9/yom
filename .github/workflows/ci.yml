name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            run-ci-check: true
          - python-version: "3.12"
            run-ci-check: false
          - python-version: "3.13"
            run-ci-check: false
    uses: ./.github/workflows/python-checks.yml
    with:
      python-version: ${{ matrix.python-version }}
      run-ci-check: ${{ matrix.run-ci-check }}
